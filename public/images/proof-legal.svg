<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" viewBox="0 0 700 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1A2B"/>
      <stop offset="100%" stop-color="#162440"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3A6EA5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3A6EA5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green" cx="80%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#2D6A4F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D6A4F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="700" height="240" fill="url(#bg)"/>
  <rect width="700" height="240" fill="url(#glow)"/>
  <rect width="700" height="240" fill="url(#green)"/>
  <!-- Scales of justice -->
  <line x1="350" y1="40" x2="350" y2="200" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <line x1="230" y1="90" x2="470" y2="90" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Left pan -->
  <line x1="230" y1="90" x2="230" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="210" y1="130" x2="250" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <path d="M 210 130 Q 230 148 250 130" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Right pan slightly lower (balanced) -->
  <line x1="470" y1="90" x2="470" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="450" y1="130" x2="490" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <path d="M 450 130 Q 470 148 490 130" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="330" y="195" width="40" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="310" y="200" width="80" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <!-- Book stack left -->
  <rect x="100" y="160" width="100" height="12" rx="2" fill="rgba(58,110,165,0.35)"/>
  <rect x="100" y="174" width="100" height="12" rx="2" fill="rgba(82,183,136,0.25)"/>
  <rect x="100" y="188" width="100" height="12" rx="2" fill="rgba(58,110,165,0.25)"/>
  <!-- Text lines on book -->
  <rect x="112" y="164" width="50" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Gavel right -->
  <rect x="510" y="155" width="80" height="18" rx="9" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1" transform="rotate(-30 550 164)"/>
  <line x1="510" y1="195" x2="570" y2="175" stroke="rgba(255,255,255,0.08)" stroke-width="6" stroke-linecap="round"/>
</svg>
