<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2118"/>
      <stop offset="100%" stop-color="#1A3D2A"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#52B788" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#40916C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#40916C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#74C69D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#74C69D" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dot" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>
  <rect width="1200" height="440" fill="url(#bg)"/>
  <rect width="1200" height="440" fill="url(#g1)"/>
  <rect width="1200" height="440" fill="url(#g2)"/>
  <rect width="1200" height="440" fill="url(#g3)"/>
  <rect width="1200" height="440" fill="url(#dot)"/>
  <!-- Whiteboard rectangle -->
  <rect x="160" y="80" width="880" height="280" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Four step boxes on whiteboard -->
  <rect x="200" y="130" width="160" height="100" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(82,183,136,0.3)" stroke-width="1.5"/>
  <rect x="390" y="130" width="160" height="100" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(82,183,136,0.3)" stroke-width="1.5"/>
  <rect x="580" y="130" width="160" height="100" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(82,183,136,0.3)" stroke-width="1.5"/>
  <rect x="770" y="130" width="160" height="100" rx="6" fill="rgba(82,183,136,0.12)" stroke="rgba(82,183,136,0.4)" stroke-width="1.5"/>
  <!-- Step number circles -->
  <circle cx="240" cy="155" r="14" fill="rgba(82,183,136,0.25)" stroke="rgba(82,183,136,0.5)" stroke-width="1"/>
  <circle cx="430" cy="155" r="14" fill="rgba(82,183,136,0.25)" stroke="rgba(82,183,136,0.5)" stroke-width="1"/>
  <circle cx="620" cy="155" r="14" fill="rgba(82,183,136,0.25)" stroke="rgba(82,183,136,0.5)" stroke-width="1"/>
  <circle cx="810" cy="155" r="14" fill="rgba(82,183,136,0.45)" stroke="rgba(82,183,136,0.7)" stroke-width="1"/>
  <!-- Step labels -->
  <rect x="218" y="178" width="80" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="218" y="194" width="64" height="5" rx="2.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="408" y="178" width="80" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="408" y="194" width="64" height="5" rx="2.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="598" y="178" width="80" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="598" y="194" width="64" height="5" rx="2.5" fill="rgba(255,255,255,0.07)"/>
  <rect x="788" y="178" width="80" height="7" rx="3.5" fill="rgba(255,255,255,0.15)"/>
  <rect x="788" y="194" width="64" height="5" rx="2.5" fill="rgba(82,183,136,0.4)"/>
  <!-- Connecting arrows -->
  <line x1="362" y1="180" x2="388" y2="180" stroke="rgba(82,183,136,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="552" y1="180" x2="578" y2="180" stroke="rgba(82,183,136,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="742" y1="180" x2="768" y2="180" stroke="rgba(82,183,136,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Post-it notes lower area -->
  <rect x="220" y="260" width="90" height="72" rx="2" fill="rgba(255,220,100,0.08)" stroke="rgba(255,220,100,0.12)" stroke-width="1"/>
  <rect x="230" y="270" width="60" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="230" y="282" width="50" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="230" y="293" width="55" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="400" y="268" width="90" height="64" rx="2" fill="rgba(130,210,190,0.08)" stroke="rgba(130,210,190,0.12)" stroke-width="1"/>
  <rect x="410" y="278" width="60" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>
  <rect x="410" y="290" width="50" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
</svg>
