<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" viewBox="0 0 700 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1F0E"/>
      <stop offset="100%" stop-color="#3D2C14"/>
    </linearGradient>
    <radialGradient id="warm" cx="60%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C08040" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C08040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="20%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#2D6A4F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D6A4F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="700" height="240" fill="url(#bg)"/>
  <rect width="700" height="240" fill="url(#warm)"/>
  <rect width="700" height="240" fill="url(#cool)"/>
  <!-- House silhouette -->
  <polygon points="350,50 220,130 480,130" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <rect x="250" y="130" width="200" height="90" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="320" y="165" width="60" height="55" rx="4" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Windows -->
  <rect x="268" y="148" width="36" height="28" rx="3" fill="rgba(192,128,64,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="396" y="148" width="36" height="28" rx="3" fill="rgba(192,128,64,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Metric badge -->
  <rect x="490" y="60" width="120" height="56" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="504" y="74" width="60" height="7" rx="3.5" fill="rgba(255,255,255,0.12)"/>
  <rect x="504" y="89" width="40" height="14" rx="4" fill="rgba(82,183,136,0.5)"/>
  <!-- Ground line -->
  <line x1="80" y1="220" x2="620" y2="220" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>
